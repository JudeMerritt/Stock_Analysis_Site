<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Analysis Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f8f6f1;
    color: #1a1a1a;
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: #1a1a1a;
    color: #f8f6f1;
    padding: 3rem 2rem 2.5rem;
  }

  .header-inner {
    max-width: 760px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 6vw, 3.2rem);
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 0.5rem;
   text-align: center;
  }

  .subtitle {
    font-size: 0.92rem;
    color: #888;
    font-style: italic;
    margin-bottom: 2rem;
   text-align: center;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: #666;
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.8rem;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 6px;
    color: #f8f6f1;
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: #555; }
  #search:focus { border-color: #666; }

  /* ── MAIN ── */
  .main {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
  }

  .results-count {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #bbb;
    padding: 1.6rem 0 0.8rem;
  }

  /* ── PAPER ENTRY ── */
  .paper {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 1.4rem;
    padding: 1.6rem 0;
    border-bottom: 1px solid #e8e4dd;
    align-items: center;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
    border-radius: 4px;
    margin: 0 -0.8rem;
    padding-left: 0.8rem;
    padding-right: 0.8rem;
  }

  .paper:hover { background: #f0ede6; }

  .paper img {
    width: 130px;
    height: 85px;
    object-fit: cover;
    display: block;
    border-radius: 4px;
    background: #e0ddd7;
  }

  .paper-info { display: flex; flex-direction: column; gap: 0.35rem; }

  .paper-ticker {
    font-family: 'Syne', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #bbb;
  }

  .paper-ticker .price { color: #1a1a1a; margin-left: 0.5rem; }
  .paper-ticker .chg { margin-left: 0.3rem; font-size: 0.65rem; }
  .paper-ticker .chg.up { color: #3a7d44; }
  .paper-ticker .chg.dn { color: #b94040; }

  .paper-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: -0.01em;
    color: #1a1a1a;
  }

  .paper-date {
    font-size: 0.76rem;
    color: #bbb;
  }

  /* ── NO RESULTS ── */
  .empty {
    padding: 3rem 0;
    text-align: center;
    color: #bbb;
    font-style: italic;
    font-size: 0.95rem;
    display: none;
  }

  /* ── FOOTER ── */
  footer {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 2rem 3rem;
    font-size: 0.75rem;
    color: #ccc;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>Stock Analysis<br>Portfolio</h1>
    <p class="subtitle">Independent equity research by Jude Merritt — click any paper to read</p>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="text" placeholder="Search by title or ticker…" oninput="doSearch(this.value)">
    </div>
  </div>
</div>

<div class="main">
  <div class="results-count" id="count"></div>
  <div id="list"></div>
  <div class="empty" id="empty">No papers found for that search.</div>
</div>

<footer>Prices via Yahoo Finance · Updated on page load</footer>

<script>
/* =====================================================
   ✏️  TO ADD A PAPER — copy one block and fill in:

     ticker : stock symbol for live price (e.g. "AAPL")
     title  : your paper headline
     url    : link to full paper (Google Doc, PDF, etc.)
     image  : any image URL, or "" for a plain placeholder
     date   : date published (any string)
===================================================== */
const PAPERS = [
  {
    ticker: "ADBE",
    title: "ADBE: A Risk-Reward Analysis",
    url: "https://canary-frost-8a2.notion.site/ADBE-32b7a6eee9ad807588afe959bce904b5",
    image: "https://image2url.com/r2/default/images/1774181654128-a2fa426c-bcd8-4cec-9e41-8800de9bb8f3.webp", 
    date: "March 22, 2026"
  },
];
/* ===================================================== */

const list = document.getElementById('list');
const countEl = document.getElementById('count');
const emptyEl = document.getElementById('empty');

/* Build DOM nodes once, store references */
const nodes = PAPERS.map(p => {
  const a = document.createElement('a');
  a.className = 'paper';
  a.href = p.url;
  a.target = '_blank';
  a.rel = 'noopener';
  a.dataset.search = (p.ticker + ' ' + p.title).toLowerCase();

  const img = document.createElement('img');
  img.alt = p.ticker;
  if (p.image) img.src = p.image;

  const info = document.createElement('div');
  info.className = 'paper-info';
  info.innerHTML = `
    <div class="paper-ticker" id="price-${p.ticker}">${p.ticker}</div>
    <div class="paper-title">${p.title}</div>
    <div class="paper-date">${p.date}</div>
  `;

  a.appendChild(img);
  a.appendChild(info);
  list.appendChild(a);
  return a;
});

function updateCount(n) {
  countEl.textContent = n === PAPERS.length ? `${n} papers` : `${n} of ${PAPERS.length} papers`;
}

function doSearch(q) {
  const term = q.trim().toLowerCase();
  let visible = 0;
  nodes.forEach(node => {
    const match = !term || node.dataset.search.includes(term);
    node.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  updateCount(visible);
  emptyEl.style.display = visible === 0 ? 'block' : 'none';
}

updateCount(PAPERS.length);

/* Live prices via Yahoo Finance */
async function fetchPrice(ticker) {
  try {
    const res = await fetch(
      `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=2d`
    );
    const data = await res.json();
    const meta = data.chart.result[0].meta;
    const price = meta.regularMarketPrice;
    const prev  = meta.chartPreviousClose;
    const chg   = ((price - prev) / prev * 100).toFixed(2);
    const up    = parseFloat(chg) >= 0;
    const el    = document.getElementById('price-' + ticker);
    if (el) {
      el.innerHTML = `${ticker} <span class="price">$${price.toFixed(2)}</span><span class="chg ${up ? 'up' : 'dn'}">${up ? '▲' : '▼'} ${Math.abs(chg)}%</span>`;
    }
  } catch (_) {}
}

PAPERS.forEach(p => fetchPrice(p.ticker));
</script>
</body>
</html>
